name: MergeProof evidence gate

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  evidence:
    name: Check acceptance-criteria evidence
    runs-on: ubuntu-latest
    steps:
      - uses: 0xnewbiewhermes/copymuse/mergeproof-action@7901c4c696ac63c6c9bbcbf2b704fb4d4a708d05
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-unproven: false
